<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Themaka · Onboarding Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f0eee9; font-family: 'Work Sans', system-ui, sans-serif; }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 24px;
    }

    /* top bar */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: rgba(61,51,40,0.55);
      letter-spacing: 0.3px;
    }
    .topbar-title {
      font-family: 'Libre Caslon Text', serif;
      font-style: italic;
      font-size: 17px;
      color: #A85A3D;
      letter-spacing: -0.2px;
    }
    .screen-label {
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(61,51,40,0.45);
    }

    /* phone + nav row */
    .phone-row {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    /* nav arrows */
    .nav-btn {
      width: 44px; height: 44px; border-radius: 22px;
      border: 1.5px solid rgba(61,51,40,0.2);
      background: rgba(255,251,242,0.7);
      color: rgba(61,51,40,0.6);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, opacity .15s;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: #FFFBF2; border-color: rgba(61,51,40,0.4); color: #3D3328; }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-btn svg { display: block; }

    /* phone frame */
    .phone-frame {
      width: 375px;
      height: 780px;
      border-radius: 42px;
      overflow: hidden;
      border: 8px solid rgba(116,119,117,0.45);
      box-shadow: 0 30px 80px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      background: #FAF3E7;
      flex-shrink: 0;
    }
    /* status bar */
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px 0 28px;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      pointer-events: none;
    }
    .status-time {
      font-size: 15px;
      font-weight: 500;
      color: #3D3328;
      letter-spacing: 0.1px;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }

    /* screen content sits below status bar */
    .screen-content {
      position: absolute;
      top: 44px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    /* notch */
    .notch {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 20;
    }

    /* dot row */
    .dot-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 4px;
      background: rgba(61,51,40,0.2);
      cursor: pointer;
      transition: all .25s ease;
      border: none;
      padding: 0;
    }
    .dot.active {
      width: 22px;
      background: #A85A3D;
    }

    /* keyboard shortcut hint */
    .hint {
      font-size: 11px;
      color: rgba(61,51,40,0.35);
      letter-spacing: 0.3px;
      text-align: center;
    }

    /* responsive – on narrow screens go full width */
    @media (max-width: 520px) {
      .phone-row { gap: 12px; }
      .phone-frame { width: 100%; height: auto; aspect-ratio: 375/780; border-radius: 0; border-left: none; border-right: none; }
      .nav-btn { display: none; }
      .shell { padding: 0; gap: 16px; justify-content: flex-start; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// Themaka design tokens — Warm & Natural palette, Libre Caslon + Work Sans,
// and hand-drawn botanical SVG accents.

const T = {
  // Cream surfaces
  cream: '#FAF3E7',
  creamWarm: '#F4E9D4',
  sand: '#E8D9BE',
  paper: '#FFFBF2',

  // Terracotta — primary accent
  terracotta: '#C47553',
  terracottaDeep: '#A85A3D',
  terracottaSoft: '#E5A98A',
  clay: '#D48B67',

  // Sage
  sage: '#8FA37E',
  sageDeep: '#5F7558',
  sageSoft: '#BACAA8',

  // Ink
  ink: '#3D3328',
  inkSoft: '#6B5D4E',
  inkMuted: '#948472',

  // Accent
  honey: '#D4A574',
  plum: '#8A5E6B',

  // Fonts
  serif: '"Libre Caslon Text", "Cormorant Garamond", Georgia, serif',
  sans: '"Work Sans", system-ui, -apple-system, sans-serif',

  radii: { sm: 8, md: 14, lg: 22, xl: 28, pill: 999 },
};

// Subtle paper grain data-url (used as overlay)
const paperGrainUrl = `url("data:image/svg+xml;utf8,${encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.24  0 0 0 0 0.18  0 0 0 0 0.12  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(#n)'/></svg>`
)}")`;

// ─── Botanical line accents ───────────────────────────────────
// Small, hand-drawn-feeling SVGs used as decorative accents.
const BotanicalSprig = ({ size = 80, color = T.sageDeep, opacity = 0.55, style }) => (
  <svg width={size} height={size * 1.3} viewBox="0 0 80 104" style={style}
       fill="none" stroke={color} strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round" opacity={opacity}>
    <path d="M40 102 C 40 70, 38 40, 42 6" />
    {/* leaves alternating */}
    <path d="M42 20 C 52 16, 60 20, 62 28 C 54 28, 46 26, 42 22 Z" fill={color} fillOpacity="0.12"/>
    <path d="M40 34 C 30 32, 22 36, 20 44 C 28 44, 36 42, 40 38 Z" fill={color} fillOpacity="0.12"/>
    <path d="M41 50 C 51 48, 59 52, 61 60 C 53 60, 45 58, 41 54 Z" fill={color} fillOpacity="0.12"/>
    <path d="M40 66 C 30 64, 22 68, 20 76 C 28 76, 36 74, 40 70 Z" fill={color} fillOpacity="0.12"/>
    <path d="M40 82 C 48 80, 55 83, 57 89" />
  </svg>
);

// The "phase" visual — layered hand-drawn waves representing the cycle
const PhaseWaves = ({ w = 280, h = 200, phase = 'luteal' }) => {
  // color progression tinted by phase
  const palettes = {
    menstrual: [T.terracottaDeep, T.terracotta, T.clay],
    follicular: [T.sage, T.sageSoft, T.honey],
    ovulation: [T.honey, T.clay, T.terracottaSoft],
    luteal:    [T.terracotta, T.honey, T.sage],
  };
  const [c1, c2, c3] = palettes[phase] || palettes.luteal;
  return (
    <svg width={w} height={h} viewBox="0 0 280 200" fill="none"
         strokeLinecap="round" strokeLinejoin="round">
      {/* faint halo */}
      <ellipse cx="140" cy="118" rx="110" ry="46" fill={c1} opacity="0.08"/>
      <path d="M14 120 Q 60 72, 110 104 Q 160 140, 210 96 Q 246 72, 268 98"
            stroke={c1} strokeWidth="1.6" opacity="0.85"/>
      <path d="M14 138 Q 60 110, 110 128 Q 160 152, 210 122 Q 246 104, 268 130"
            stroke={c2} strokeWidth="1.3" opacity="0.75"/>
      <path d="M14 156 Q 60 142, 110 152 Q 160 168, 210 146 Q 246 132, 268 158"
            stroke={c3} strokeWidth="1.1" opacity="0.6"/>
      {/* tiny seed dot — current position */}
      <circle cx="160" cy="152" r="5" fill={c1}/>
      <circle cx="160" cy="152" r="11" fill="none" stroke={c1} strokeWidth="1" opacity="0.4"/>
    </svg>
  );
};

// A small branching line used as section divider
const Branch = ({ w = 80, color = T.sageDeep, opacity = 0.5 }) => (
  <svg width={w} height="18" viewBox="0 0 80 18" fill="none" stroke={color}
       strokeWidth="1" strokeLinecap="round" opacity={opacity}>
    <path d="M0 9 H 34"/>
    <path d="M46 9 H 80"/>
    <path d="M36 9 C 38 5, 42 5, 44 9 C 42 13, 38 13, 36 9 Z" fill={color} fillOpacity="0.2"/>
  </svg>
);

// Seed/dot used for step indicators
const SeedDot = ({ active, color = T.terracotta }) => (
  <span style={{
    width: active ? 22 : 7, height: 7, borderRadius: 4,
    background: active ? color : 'rgba(61,51,40,0.2)',
    display: 'inline-block', transition: 'all .35s ease',
  }}/>
);

Object.assign(window, { T, paperGrainUrl, BotanicalSprig, PhaseWaves, Branch, SeedDot });
// Themaka — Home screen variations
// A: Journal stack — warm cream paper, layered cards, botanical sprig
// B: Focal hero — large phase illustration, single hero card, minimal

function HomeA() {
  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.sans, color: T.ink, position: 'relative',
      overflow: 'hidden', display: 'flex', flexDirection: 'column',
    }}>
      {/* paper grain overlay */}
      <div style={{ position: 'absolute', inset: 0, backgroundImage: paperGrainUrl, opacity: 0.7, pointerEvents: 'none' }}/>
      {/* botanical corner */}
      <div style={{ position: 'absolute', top: -8, right: -14, opacity: 0.9 }}>
        <BotanicalSprig size={120} color={T.sageDeep} opacity={0.35}/>
      </div>

      {/* Status / greeting */}
      <div style={{ padding: '22px 28px 0', position: 'relative', zIndex: 1 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 11, letterSpacing: 2.4, textTransform: 'uppercase', color: T.inkMuted }}>
            Tuesday · April 21
          </span>
          <div style={{
            width: 34, height: 34, borderRadius: 17, background: T.sand,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: T.serif, fontSize: 14, color: T.ink,
          }}>M</div>
        </div>
        <h1 style={{
          fontFamily: T.serif, fontSize: 32, fontWeight: 400, lineHeight: 1.15,
          margin: '18px 0 4px', letterSpacing: -0.4,
        }}>
          Good morning, <em style={{ fontStyle: 'italic', color: T.terracottaDeep }}>Mara</em>.
        </h1>
        <p style={{ fontSize: 14, color: T.inkSoft, margin: 0, lineHeight: 1.5 }}>
          Your body is steady today. Here's what it's asking for.
        </p>
      </div>

      {/* Phase card */}
      <div style={{
        margin: '24px 20px 0', padding: '22px 22px 20px',
        background: T.paper, borderRadius: T.radii.xl,
        boxShadow: '0 1px 0 rgba(61,51,40,0.05), 0 14px 30px -16px rgba(61,51,40,0.12)',
        position: 'relative', zIndex: 1, overflow: 'hidden',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{ fontSize: 10.5, letterSpacing: 2.2, textTransform: 'uppercase', color: T.sageDeep, marginBottom: 6 }}>
              Phase
            </div>
            <div style={{ fontFamily: T.serif, fontSize: 22, lineHeight: 1.2, color: T.ink }}>
              Luteal <span style={{ color: T.terracottaDeep }}>—</span> <em style={{ fontStyle: 'italic' }}>Day 18</em>
            </div>
          </div>
          <div style={{
            fontFamily: T.serif, fontSize: 13, fontStyle: 'italic',
            color: T.inkMuted, marginTop: 4,
          }}>approx.</div>
        </div>

        <div style={{ margin: '12px -4px 6px' }}>
          <PhaseWaves w={260} h={130} phase="luteal"/>
        </div>

        {/* cycle track */}
        <div style={{ marginTop: 4 }}>
          <div style={{
            height: 3, borderRadius: 2, background: T.sand, position: 'relative', overflow: 'hidden',
          }}>
            <div style={{
              position: 'absolute', left: 0, top: 0, bottom: 0, width: '64%',
              background: `linear-gradient(90deg, ${T.sageSoft}, ${T.honey}, ${T.terracotta})`,
            }}/>
            <div style={{
              position: 'absolute', left: '64%', top: -3, width: 9, height: 9, borderRadius: 5,
              background: T.terracottaDeep, transform: 'translateX(-4px)',
              boxShadow: `0 0 0 3px ${T.paper}`,
            }}/>
          </div>
          <div style={{
            display: 'flex', justifyContent: 'space-between',
            marginTop: 8, fontSize: 10, letterSpacing: 1.2, textTransform: 'uppercase', color: T.inkMuted,
          }}>
            <span>Menstrual</span><span>Follicular</span><span>Ovulation</span><span style={{ color: T.terracottaDeep, fontWeight: 500 }}>Luteal</span>
          </div>
        </div>
      </div>

      {/* Today's tip */}
      <div style={{
        margin: '16px 20px 0', padding: '18px 22px 20px',
        background: T.terracottaSoft + '55', borderRadius: T.radii.xl,
        border: `1px solid ${T.terracottaSoft}88`,
        position: 'relative', zIndex: 1,
      }}>
        <div style={{ fontSize: 10.5, letterSpacing: 2.2, textTransform: 'uppercase', color: T.terracottaDeep, marginBottom: 8 }}>
          Today's tip
        </div>
        <p style={{
          fontFamily: T.serif, fontSize: 17, lineHeight: 1.38, margin: '0 0 12px',
          color: T.ink, textWrap: 'pretty',
        }}>
          Progesterone is rising. Warm, grounding meals and a little extra <em style={{ fontStyle: 'italic' }}>magnesium</em> will settle your nervous system tonight.
        </p>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {['Sweet potato', 'Leafy greens', 'Dark chocolate'].map(t => (
            <span key={t} style={{
              fontSize: 11.5, padding: '5px 10px', borderRadius: T.radii.pill,
              background: T.paper, color: T.terracottaDeep, border: `1px solid ${T.terracottaSoft}`,
            }}>{t}</span>
          ))}
        </div>
      </div>

      {/* Glance row */}
      <div style={{ display: 'flex', gap: 10, margin: '14px 20px 0', position: 'relative', zIndex: 1 }}>
        <GlanceCard label="Eating window" value="7:15a – 6:30p" accent={T.sage}/>
        <GlanceCard label="Movement" value="Walk · 30 min" accent={T.honey}/>
      </div>

      {/* Nav */}
      <div style={{ flex: 1 }}/>
      <HomeNav/>
    </div>
  );
}

function GlanceCard({ label, value, accent }) {
  return (
    <div style={{
      flex: 1, padding: '12px 14px', background: T.paper,
      borderRadius: T.radii.md, border: `1px solid ${T.sand}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
        <span style={{ width: 5, height: 5, borderRadius: 3, background: accent }}/>
        <span style={{ fontSize: 10, letterSpacing: 1.6, textTransform: 'uppercase', color: T.inkMuted }}>{label}</span>
      </div>
      <div style={{ fontFamily: T.serif, fontSize: 15, color: T.ink, lineHeight: 1.2 }}>{value}</div>
    </div>
  );
}

function HomeNav() {
  const items = [
    { k: 'home', label: 'Today', icon: (<circle cx="12" cy="12" r="4"/>), active: true },
    { k: 'cycle', label: 'Cycle', icon: (<><circle cx="12" cy="12" r="7"/><circle cx="16" cy="10" r="1.2" fill="currentColor"/></>) },
    { k: 'eat', label: 'Eat', icon: (<path d="M8 4v16M16 4v8a3 3 0 0 0 3 3"/>) },
    { k: 'journal', label: 'Journal', icon: (<path d="M6 4h10l2 2v14H6z M10 10h6 M10 14h4"/>) },
  ];
  return (
    <nav style={{
      display: 'flex', justifyContent: 'space-around', padding: '14px 12px 18px',
      background: T.paper, borderTop: `1px solid ${T.sand}`, position: 'relative', zIndex: 1,
    }}>
      {items.map(it => (
        <div key={it.k} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke={it.active ? T.terracottaDeep : T.inkMuted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            {it.icon}
          </svg>
          <span style={{
            fontSize: 10.5, letterSpacing: 0.4,
            color: it.active ? T.terracottaDeep : T.inkMuted,
            fontWeight: it.active ? 500 : 400,
          }}>{it.label}</span>
        </div>
      ))}
    </nav>
  );
}

// ─── Variation B — focal hero ────────────────────────────────
function HomeB() {
  return (
    <div style={{
      width: '100%', height: '100%', background: T.creamWarm,
      fontFamily: T.sans, color: T.ink, position: 'relative',
      overflow: 'hidden', display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ position: 'absolute', inset: 0, backgroundImage: paperGrainUrl, opacity: 0.55, pointerEvents: 'none' }}/>

      {/* Header */}
      <div style={{ padding: '22px 26px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontFamily: T.serif, fontSize: 22, fontStyle: 'italic', color: T.ink, letterSpacing: -0.3 }}>
          Themaka
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <IconButton><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></IconButton>
          <IconButton><path d="M12 3v2M12 19v2M5 12H3M21 12h-2"/><circle cx="12" cy="12" r="6"/></IconButton>
        </div>
      </div>

      {/* Hero phase */}
      <div style={{ margin: '18px 0 0', textAlign: 'center', position: 'relative' }}>
        <div style={{ fontSize: 10.5, letterSpacing: 2.6, textTransform: 'uppercase', color: T.inkMuted }}>
          Tuesday · Day 18
        </div>
        <h1 style={{
          fontFamily: T.serif, fontSize: 44, fontWeight: 400, margin: '8px 0 2px',
          letterSpacing: -1.2, lineHeight: 1,
        }}>Luteal</h1>
        <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 15, color: T.terracottaDeep }}>
          the gathering phase
        </div>

        {/* big circular illustration */}
        <div style={{ position: 'relative', margin: '18px auto 0', width: 260, height: 260 }}>
          <svg width="260" height="260" viewBox="0 0 260 260" fill="none">
            {/* outer arc rings */}
            <circle cx="130" cy="130" r="118" stroke={T.terracottaSoft} strokeWidth="0.8" strokeDasharray="1 4"/>
            <circle cx="130" cy="130" r="96" stroke={T.sageSoft} strokeWidth="0.8" strokeDasharray="1 4"/>
            {/* filled disc */}
            <defs>
              <radialGradient id="hd" cx="40%" cy="40%">
                <stop offset="0%" stopColor={T.terracottaSoft}/>
                <stop offset="60%" stopColor={T.clay}/>
                <stop offset="100%" stopColor={T.terracottaDeep}/>
              </radialGradient>
            </defs>
            <circle cx="130" cy="130" r="78" fill="url(#hd)"/>
            {/* hand-drawn waves inside */}
            <path d="M70 130 Q 100 110, 130 130 Q 160 150, 190 130" stroke={T.paper} strokeWidth="1" fill="none" opacity="0.6"/>
            <path d="M70 145 Q 100 125, 130 145 Q 160 165, 190 145" stroke={T.paper} strokeWidth="1" fill="none" opacity="0.45"/>
            <path d="M70 115 Q 100 95, 130 115 Q 160 135, 190 115" stroke={T.paper} strokeWidth="1" fill="none" opacity="0.35"/>
            {/* current marker */}
            <circle cx="205" cy="82" r="4" fill={T.ink}/>
            <circle cx="205" cy="82" r="9" stroke={T.ink} strokeWidth="0.8" fill="none" opacity="0.4"/>
          </svg>
          <div style={{ position: 'absolute', top: -6, left: -18 }}>
            <BotanicalSprig size={42} color={T.sageDeep} opacity={0.55}/>
          </div>
          <div style={{ position: 'absolute', bottom: 4, right: -6, transform: 'rotate(140deg)' }}>
            <BotanicalSprig size={34} color={T.sageDeep} opacity={0.45}/>
          </div>
        </div>
      </div>

      {/* Hero tip */}
      <div style={{
        margin: '14px 22px 0', padding: '18px 20px 18px',
        background: T.paper, borderRadius: T.radii.lg,
        border: `1px solid ${T.sand}`,
      }}>
        <div style={{ fontSize: 10.5, letterSpacing: 2, textTransform: 'uppercase', color: T.sageDeep, marginBottom: 6 }}>
          What today wants
        </div>
        <p style={{
          fontFamily: T.serif, fontSize: 16.5, lineHeight: 1.4, margin: 0, color: T.ink, textWrap: 'pretty',
        }}>
          Steady your blood sugar — eat protein with every meal, and save the hardest workout for tomorrow.
        </p>
      </div>

      {/* pill row */}
      <div style={{ display: 'flex', gap: 8, padding: '14px 22px 0', overflow: 'hidden' }}>
        {[
          { k: 'eat', label: 'Breakfast · 7:30', on: true },
          { k: 'move', label: 'Walk' },
          { k: 'rest', label: 'Wind-down' },
        ].map(p => (
          <span key={p.k} style={{
            padding: '7px 12px', borderRadius: T.radii.pill,
            background: p.on ? T.terracottaDeep : 'transparent',
            color: p.on ? T.paper : T.inkSoft,
            border: p.on ? 'none' : `1px solid ${T.inkMuted}55`,
            fontSize: 12, whiteSpace: 'nowrap',
          }}>{p.label}</span>
        ))}
      </div>

      <div style={{ flex: 1 }}/>
      <HomeNav/>
    </div>
  );
}

function IconButton({ children }) {
  return (
    <button style={{
      width: 36, height: 36, borderRadius: 18, border: `1px solid ${T.sand}`,
      background: T.paper, display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: T.inkSoft, cursor: 'pointer',
    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">{children}</svg>
    </button>
  );

  const k = kind.toLowerCase();
  let body;
  if (k.includes('oat') || k.includes('yogurt')) {
    body = (
      <>
        <path d="M6 18 Q 6 24, 20 24 Q 34 24, 34 18 L 32 14 H 8 Z" fill={T.sand} stroke={T.inkMuted} strokeWidth="1"/>
        <circle cx="14" cy="13" r="2" fill={T.terracottaDeep}/>
        <circle cx="20" cy="12" r="2" fill={T.plum}/>
        <circle cx="26" cy="13" r="2" fill={T.terracotta}/>
      </>
    );
  } else if (k.includes('egg')) {
    body = (
      <>
        <rect x="6" y="15" width="28" height="10" rx="2" fill={T.honey} stroke={T.inkMuted} strokeWidth="1"/>
        <ellipse cx="15" cy="14" rx="4.5" ry="3" fill={T.paper} stroke={T.inkMuted} strokeWidth="0.8"/>

        <circle cx="25" cy="14" r="1.8" fill={T.honey}/>
      </>
    );
  } else {
    body = <circle cx="20" cy="20" r="12" fill={T.sageSoft} stroke={T.inkMuted} strokeWidth="1"/>;
  }
  return (
    <div style={{
      width: 40, height: 40, borderRadius: 20, background: T.paper,
      border: `1px solid ${T.sand}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,

      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">{body}</svg>
    </div>
  );
}

function Calendar({ selected, hovered = [] }) {
  // April 2026 — 30 days, starts Wednesday (index 3)
  const firstDay = 3;
  const days = 30;
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= days; d++) cells.push(d);
  while (cells.length % 7) cells.push(null);
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
      {cells.map((d, i) => {
        const isSel = d === selected;
        const isHover = hovered.includes(d);
        return (
          <div key={i} style={{
            aspectRatio: '1 / 1', display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 12.5, color: d ? (isSel ? T.paper : T.ink) : 'transparent',
            borderRadius: 999,
            background: isSel ? T.terracottaDeep : (isHover && !isSel ? T.terracottaSoft + '55' : 'transparent'),
            fontFamily: isSel ? T.serif : T.sans,
            fontWeight: isSel ? 500 : 400,
          }}>{d || '·'}</div>
        );
      })}
    </div>
  );
}

// ─── Shared chrome ──────────────────────────────────────────
function OBFrame({ step, total, label, onBack, onSkip, bg = T.cream, children, footer, showSkip = true }) {
  return (
    <div style={{
      width: '100%', height: '100%', background: bg,
      fontFamily: T.sans, color: T.ink, position: 'relative',
      overflow: 'hidden', display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ position: 'absolute', inset: 0, backgroundImage: paperGrainUrl, opacity: 0.5, pointerEvents: 'none' }}/>

      {/* chrome */}
      <div style={{ padding: '18px 22px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', zIndex: 2 }}>
        {onBack !== null ? (
          <button style={chromeBtn}>← Back</button>
        ) : <div style={{ width: 44 }}/>}
        <div style={{
          fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: T.inkMuted,
        }}>
          {label}
        </div>
        {showSkip ? (
          <button style={chromeBtn}>Skip</button>
        ) : <div style={{ width: 44 }}/>}
      </div>

      {/* step ticks */}
      <div style={{ padding: '12px 22px 0', display: 'flex', gap: 3, position: 'relative', zIndex: 2 }}>
        {Array.from({ length: total }).map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 2, borderRadius: 1,
            background: i < step ? T.terracottaDeep : (i === step ? T.terracottaSoft : T.sand),
          }}/>
        ))}
      </div>

      <div style={{ flex: 1, overflow: 'hidden', position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>

      {footer && <div style={{ padding: '0 22px 26px', position: 'relative', zIndex: 2 }}>{footer}</div>}
    </div>
  );
}

const chromeBtn = {
  border: 'none', background: 'transparent', color: T.inkMuted,
  fontSize: 13, cursor: 'pointer', padding: 0, minWidth: 44, textAlign: 'left',
  fontFamily: T.sans,
};

function PrimaryBtn({ children, color = T.ink }) {
  return (
    <button style={{
      width: '100%', padding: '14px', borderRadius: T.radii.pill,
      background: color, color: T.paper, border: 'none',
      fontFamily: T.sans, fontSize: 14.5, fontWeight: 500, letterSpacing: 0.3, cursor: 'pointer',
    }}>{children}</button>
  );
}
function GhostBtn({ children }) {
  return (
    <button style={{
      width: '100%', padding: '13px', borderRadius: T.radii.pill,
      background: 'transparent', color: T.ink, border: `1px solid ${T.ink}66`,
      fontFamily: T.sans, fontSize: 14, fontWeight: 500, cursor: 'pointer',
    }}>{children}</button>
  );
}
function SectionLabel({ children, color = T.sageDeep }) {
  return <div style={{ fontSize: 10.5, letterSpacing: 2.4, textTransform: 'uppercase', color, marginBottom: 10 }}>{children}</div>;
}
function Title({ children, size = 30 }) {
  return <h1 style={{
    fontFamily: T.serif, fontSize: size, fontWeight: 400, margin: 0,
    lineHeight: 1.12, letterSpacing: -0.5, textWrap: 'pretty', color: T.ink,

function Blurb({ children }) {
  return <p style={{
    fontSize: 14, color: T.inkSoft, margin: '12px 0 0', lineHeight: 1.55, textWrap: 'pretty',

const calNav2 = {
  width: 28, height: 28, borderRadius: 14, border: `1px solid ${T.sand}`,
  background: 'transparent', color: T.inkSoft, cursor: 'pointer', fontSize: 14, lineHeight: 1,
};
function MiniCalendar({ selected, highlight = [] }) {
  const firstDay = 3, days = 30;
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= days; d++) cells.push(d);
  while (cells.length % 7) cells.push(null);
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
      {cells.map((d, i) => {
        const isSel = d === selected;
        const isHl = highlight.includes(d) && !isSel;
        return (
          <div key={i} style={{
            aspectRatio: '1 / 1', display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 12.5, color: d ? (isSel ? T.paper : T.ink) : 'transparent',
            borderRadius: 999,
            background: isSel ? T.terracottaDeep : (isHl ? T.terracottaSoft + '55' : 'transparent'),
            fontFamily: isSel ? T.serif : T.sans,
            fontWeight: isSel ? 500 : 400,
          }}>{d || '·'}</div>
        );
      })}
    </div>
  );
}

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Screens in prototype order ─────────────────────────────────
// Each entry: { id, label, section, Component }
// We wait until all window globals are set before referencing them.

function buildScreens() {
  return [
    // ── Home & notification ──
    { id: 'home',   label: 'Home screen',       section: 'Home',                Component: window.HomeA },
    { id: 'notif',  label: 'Morning card',       section: 'Morning notification', Component: window.NotifA },
    // ── Registration ──
    { id: 'ob01',   label: '01 · Welcome',       section: 'Registration',         Component: window.OB01Welcome },
    { id: 'ob02',   label: '02 · Account',       section: 'Registration',         Component: window.OB02Account },
    { id: 'ob03',   label: '03 · Name & age',    section: 'Registration',         Component: window.OB03NameAge },
    // ── Personalization ──
    { id: 'ob04',   label: '04 · Wake time',     section: 'Personalize',          Component: window.OB04Wake },
    { id: 'ob05',   label: '05 · Last period',   section: 'Personalize',          Component: window.OB05Cycle },
    { id: 'ob06',   label: '06 · Symptoms',      section: 'Personalize',          Component: window.OB06Symptoms },
    { id: 'ob07',   label: '07 · Food prefs',    section: 'Personalize',          Component: window.OB07Food },
    { id: 'ob08',   label: '08 · Movement',      section: 'Personalize',          Component: window.OB08Move },
    // ── Hook ──
    { id: 'ob09',   label: '09 · Trigger',       section: 'Hook (Nir Eyal)',      Component: window.OB09Trigger },
    { id: 'ob10',   label: '10 · Reward',        section: 'Hook (Nir Eyal)',      Component: window.OB10Reward },
    { id: 'ob11',   label: '11 · Investment',    section: 'Hook (Nir Eyal)',      Component: window.OB11Investment },
    { id: 'ob12',   label: '12 · Ready',         section: 'Hook (Nir Eyal)',      Component: window.OB12Ready },
    // ── Parked ──
    { id: 'hero',   label: 'Cycle hero (parked)',section: 'Saved for later',      Component: window.HomeB },
  ];
}

// Battery icon
function BatteryIcon() {
  return (
    <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
      <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#3D3328" strokeOpacity="0.35"/>
      <rect x="2" y="2" width="16" height="8" rx="2" fill="#3D3328" fillOpacity="0.7"/>
      <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#3D3328" fillOpacity="0.4"/>
    </svg>
  );
}
function WifiIcon() {
  return (
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
      <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="#3D3328" fillOpacity="0.7"/>
      <path d="M4.5 7a5 5 0 0 1 7 0" stroke="#3D3328" strokeOpacity="0.7" strokeWidth="1.3" strokeLinecap="round"/>
      <path d="M2 4.5a8 8 0 0 1 12 0" stroke="#3D3328" strokeOpacity="0.45" strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );
}

// ── Thin click-through overlay for non-interactive prototype ──
// Tapping the screen itself advances to next screen.
function TapOverlay({ onTap }) {
  return (
    <div onClick={onTap} style={{
      position: 'absolute', inset: 0, zIndex: 50,
      cursor: 'pointer',
    }} title="Tap to advance"/>
  );
}

// ── Main prototype shell ───────────────────────────────────────
function Prototype() {
  const [idx, setIdx]     = useState(0);
  const [anim, setAnim]   = useState('in'); // 'in' | 'out'
  const screens = buildScreens();
  const total   = screens.length;

  const goTo = useCallback((next) => {
    if (next < 0 || next >= total) return;
    setAnim('out');
    setTimeout(() => { setIdx(next); setAnim('in'); }, 120);
  }, [total]);

  const prev = () => goTo(idx - 1);
  const next = () => goTo(idx + 1);

  // keyboard nav
  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [idx]);

  const screen = screens[idx];
  const Screen = screen.Component;

  return (
    <div className="shell">
      {/* top bar */}
      <div className="topbar">
        <span className="topbar-title">Themaka</span>
        <span style={{ opacity: 0.35 }}>·</span>
        <span className="screen-label">{screen.section}</span>
        <span style={{ opacity: 0.35 }}>·</span>
        <span className="screen-label">{screen.label}</span>
      </div>

      {/* phone + arrows */}
      <div className="phone-row">
        <button className="nav-btn" onClick={prev} disabled={idx === 0} aria-label="Previous screen">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <path d="M11 3L5 9l6 6"/>
          </svg>
        </button>

        <div className="phone-frame">
          <div className="notch"/>
          {/* status bar */}
          <div className="status-bar">
            <span className="status-time">9:41</span>
            <div className="status-icons">
              <WifiIcon/>
              <BatteryIcon/>
            </div>
          </div>
          {/* screen content */}
          <div className="screen-content" style={{
            transition: 'opacity .12s ease',
            opacity: anim === 'in' ? 1 : 0,
          }}>
            {Screen ? <Screen/> : (
              <div style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center', color:'#948472', fontSize:14 }}>
                Loading…
              </div>
            )}
            {/* tap-to-advance overlay (only on non-last screen) */}
            {idx < total - 1 && <TapOverlay onTap={next}/>}
          </div>
        </div>

        <button className="nav-btn" onClick={next} disabled={idx === total - 1} aria-label="Next screen">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <path d="M7 3l6 6-6 6"/>
          </svg>
        </button>
      </div>

      {/* dot nav */}
      <div className="dot-row">
        {screens.map((s, i) => (
          <button key={s.id} className={`dot ${i === idx ? 'active' : ''}`}
            onClick={() => goTo(i)} title={s.label} aria-label={s.label}/>
        ))}
      </div>

      <p className="hint">Click the screen · arrow keys · or dots to navigate &nbsp;({idx + 1} / {total})</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Prototype/>);
</script>
